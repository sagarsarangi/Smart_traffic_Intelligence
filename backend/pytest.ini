# Pytest configuration for the Smart Traffic Intelligence backend.
#
# Run from the project root with:
#     pytest                              # (picked up via rootdir + testpaths)
# or explicitly:
#     python -m pytest backend/tests -v
#
# Coverage report is printed to the terminal and written to backend/coverage.xml.

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Keep warnings concise — the FastAPI on_event deprecation warning is expected.
filterwarnings =
    ignore::DeprecationWarning

addopts =
    --strict-markers
    -ra
    --cov=backend
    --cov-report=term-missing
    --cov-report=xml
