name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Run Pytest
        run: cd backend && pytest --cov=backend --cov-report=term-missing --cov-report=xml
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Lint
        run: cd frontend && npm run lint
      - name: Typecheck
        run: cd frontend && npx tsc --noEmit
      - name: Build
        run: cd frontend && npm run build
      - name: Test
        run: cd frontend && npm test

  quality:
    name: Quality Gate
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert No Secrets
        run: |
          if grep -i 'GROQ_API_KEY=' backend/.env 2>/dev/null || grep -i 'GROQ_API_KEY=' frontend/.env 2>/dev/null; then
            echo "Secrets found in repo! Failing."
            exit 1
          fi
          if [ ! -f "backend/feedback.jsonl" ]; then
             echo "feedback.jsonl drift OK."
          fi
          echo "All quality checks passed!"
